"<!DOCTYPE html>\n<html lang=\"sv\"><head>\n<!-- Agents: this file is a self-unpacking Claude Design artifact \u2014 its HTML source is just a loader. For clean content, fetch the markdown companion at ./index.md instead. -->\n<link rel=\"alternate\" type=\"text/markdown\" href=\"index.md\" title=\"Markdown version for agents\">\n\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Lagrapport \u2014 K\u00e4vlinge HK F14</title>\n<style>/* =================================================================\n   K\u00e4vlinge HK F14 \u2014 Lagrapport\n   Built on Vaam Design System with team color overrides:\n   blue   #025991  (replaces --vaam-blue)\n   orange #F39000  (replaces --vaam-accent yellow \u2014 used as accent)\n   ================================================================= */\n\n/* ---- Fonts ---- */\n@font-face { font-family: \"GT America\"; src: url(\"b56385ff-8916-4e1e-b25b-c641f8dec378\") format(\"woff2\"); font-weight: 400; font-display: swap; }\n@font-face { font-family: \"GT America\"; src: url(\"f8060e59-cad8-4887-99c0-e889ccf165d6\") format(\"woff2\"); font-weight: 500; font-display: swap; }\n@font-face { font-family: \"GT America\"; src: url(\"b807d26c-87e3-448d-a8b9-8cf2a793d167\") format(\"woff2\"); font-weight: 700; font-display: swap; }\n@font-face { font-family: \"GT America\"; src: url(\"5f1322d6-711c-4793-a804-57642c9d84e9\") format(\"woff2\"); font-weight: 900; font-display: swap; }\n@font-face { font-family: \"GT America Extended\"; src: url(\"f60da5de-ed6b-4dac-83e2-eaa8a1dca420\") format(\"woff2\"); font-weight: 700; font-display: swap; }\n@font-face { font-family: \"GT America Extended\"; src: url(\"915f63ab-4e21-43f7-b406-9c5f1c482f0a\") format(\"woff2\"); font-weight: 900; font-display: swap; }\n@font-face { font-family: \"GT America Mono\"; src: url(\"914afdd7-89fa-4884-9dfe-072c30f0e123\") format(\"woff2\"); font-weight: 400; font-display: swap; }\n\n:root {\n  /* Team colors (override the design system) */\n  --blue:      #025991;\n  --blue-700:  #024372;\n  --blue-100:  #E6EFF5;\n  --blue-50:   #F4F8FB;\n\n  --orange:    #F39000;\n  --orange-700:#C97600;\n  --orange-100:#FFE9CC;\n  --orange-50: #FFF6E8;\n\n  --ivory:     #FFFDF5;\n  --ink:       #0E1A2A;\n  --ink-2:     #2A384B;\n  --slate:     #5A6877;\n  --line:      #E2E8EE;\n  --bg:        #FBFAF5;\n  --card:      #FFFFFF;\n\n  --good:      #1F8A4C;\n  --good-100:  #D7F0DF;\n  --warn:      #C2410C;\n  --warn-100:  #FFE2C9;\n\n  --font-sans: \"GT America\", ui-sans-serif, system-ui, sans-serif;\n  --font-disp: \"GT America Extended\", \"GT America\", sans-serif;\n  --font-mono: \"GT America Mono\", ui-monospace, monospace;\n}\n\n* { box-sizing: border-box; }\n\nhtml, body {\n  margin: 0;\n  padding: 0;\n  background: var(--bg);\n  color: var(--ink);\n  font-family: var(--font-sans);\n  font-size: 16px;\n  line-height: 1.55;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n.page {\n  max-width: 1080px;\n  margin: 0 auto;\n  padding: 56px 48px 96px;\n}\n\n/* ============== HERO ============== */\n\n.hero {\n  padding-bottom: 56px;\n  border-bottom: 1px solid var(--line);\n  margin-bottom: 56px;\n}\n.hero-meta {\n  display: flex;\n  align-items: center;\n  gap: 14px;\n  margin-bottom: 32px;\n  font-family: var(--font-mono);\n  font-size: 12px;\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  color: var(--slate);\n}\n.badge {\n  background: var(--blue);\n  color: var(--ivory);\n  padding: 6px 12px;\n  border-radius: 4px;\n  font-weight: 500;\n}\n.meta-dot {\n  width: 4px; height: 4px; background: var(--slate); border-radius: 50%;\n}\n\n.hero-title {\n  font-family: var(--font-disp);\n  font-weight: 900;\n  font-size: clamp(54px, 8vw, 104px);\n  line-height: 0.92;\n  letter-spacing: -0.035em;\n  color: var(--ink);\n  margin: 0 0 28px;\n}\n.hero-title em {\n  font-style: normal;\n  color: var(--orange);\n}\n.hero-sub {\n  font-size: 20px;\n  line-height: 1.45;\n  color: var(--ink-2);\n  max-width: 720px;\n  margin: 0 0 48px;\n  text-wrap: pretty;\n}\n\n.mood-overview {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 1px;\n  background: var(--line);\n  border: 1px solid var(--line);\n  border-radius: 8px;\n  overflow: hidden;\n}\n.mood-cell {\n  background: var(--card);\n  padding: 28px 24px;\n  display: flex;\n  flex-direction: column;\n  gap: 10px;\n}\n.mood-cell.good {\n  background: var(--card);\n}\n.mood-cell.warn {\n  background: var(--orange-50);\n}\n.mood-num {\n  font-family: var(--font-disp);\n  font-weight: 900;\n  font-size: 56px;\n  line-height: 1;\n  letter-spacing: -0.04em;\n  color: var(--blue);\n}\n.mood-cell.warn .mood-num {\n  color: var(--orange-700);\n}\n.mood-num span {\n  font-size: 28px;\n  vertical-align: top;\n  margin-left: 2px;\n}\n.mood-lbl {\n  font-size: 13px;\n  line-height: 1.4;\n  color: var(--slate);\n  text-wrap: pretty;\n}\n\n/* ============== TLDR ============== */\n\n.tldr {\n  background: var(--ink);\n  color: var(--ivory);\n  border-radius: 12px;\n  padding: 40px;\n  margin-bottom: 80px;\n  position: relative;\n  overflow: hidden;\n}\n.tldr::before {\n  content: \"\";\n  position: absolute;\n  top: -120px; right: -120px;\n  width: 360px; height: 360px;\n  background: radial-gradient(closest-side, rgba(243,144,0,0.18), transparent 70%);\n  pointer-events: none;\n}\n.tldr-tag {\n  display: inline-block;\n  font-family: var(--font-mono);\n  font-size: 12px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--orange);\n  border: 1px solid rgba(243,144,0,0.4);\n  padding: 5px 12px;\n  border-radius: 4px;\n  margin-bottom: 28px;\n}\n.tldr-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 36px;\n  position: relative;\n}\n.tldr-col h3 {\n  font-family: var(--font-disp);\n  font-weight: 700;\n  font-size: 22px;\n  line-height: 1.1;\n  letter-spacing: -0.02em;\n  margin: 0 0 14px;\n  color: var(--ivory);\n}\n.tldr-col p {\n  font-size: 15px;\n  line-height: 1.55;\n  color: rgba(255,253,245,0.78);\n  margin: 0;\n}\n.tldr-col p strong {\n  color: var(--ivory);\n  font-weight: 700;\n}\n.tldr-col ul {\n  margin: 0;\n  padding-left: 20px;\n  color: rgba(255,253,245,0.78);\n  font-size: 15px;\n  line-height: 1.55;\n}\n.tldr-col ul li { margin-bottom: 6px; }\n.tldr-col ul li strong { color: var(--ivory); }\n\n/* ============== DIVIDER ============== */\n\n.divider {\n  display: flex;\n  align-items: baseline;\n  gap: 16px;\n  margin: 80px 0 32px;\n}\n.divider-num {\n  font-family: var(--font-mono);\n  font-size: 13px;\n  color: var(--orange);\n  letter-spacing: 0.1em;\n}\n.divider-label {\n  font-family: var(--font-disp);\n  font-weight: 900;\n  font-size: 14px;\n  text-transform: uppercase;\n  letter-spacing: 0.12em;\n  color: var(--ink);\n}\n.divider-line {\n  flex: 1;\n  height: 1px;\n  background: var(--line);\n}\n\n/* ============== Q-CARD ============== */\n\n.q-card {\n  background: var(--card);\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  padding: 40px;\n  margin-bottom: 24px;\n  position: relative;\n}\n.q-card.flag {\n  border-color: var(--orange-100);\n  background: linear-gradient(180deg, var(--orange-50) 0%, var(--card) 60%);\n}\n.q-card.highlight {\n  background: var(--blue);\n  color: var(--ivory);\n  border-color: var(--blue-700);\n}\n.q-card.highlight .q-title,\n.q-card.highlight .q-sub { color: var(--ivory); }\n.q-card.highlight .q-num {\n  background: rgba(255,253,245,0.14);\n  color: var(--ivory);\n}\n\n.q-head {\n  display: grid;\n  grid-template-columns: auto 1fr auto;\n  gap: 24px;\n  align-items: start;\n  margin-bottom: 28px;\n}\n.q-num {\n  font-family: var(--font-mono);\n  font-size: 13px;\n  font-weight: 500;\n  background: var(--blue-100);\n  color: var(--blue);\n  padding: 6px 10px;\n  border-radius: 4px;\n  letter-spacing: 0.04em;\n  align-self: start;\n}\n.flag-num {\n  background: var(--orange-100);\n  color: var(--orange-700);\n}\n.q-title {\n  font-family: var(--font-disp);\n  font-weight: 900;\n  font-size: 30px;\n  line-height: 1.05;\n  letter-spacing: -0.025em;\n  color: var(--ink);\n  margin: 0 0 8px;\n}\n.q-sub {\n  font-size: 14px;\n  color: var(--slate);\n  margin: 0;\n}\n.q-score {\n  text-align: right;\n  min-width: 120px;\n}\n.q-score.warn .score-num { color: var(--orange-700); }\n.q-score.big .score-num { font-size: 64px; }\n.score-num {\n  font-family: var(--font-disp);\n  font-weight: 900;\n  font-size: 44px;\n  line-height: 1;\n  letter-spacing: -0.03em;\n  color: var(--blue);\n}\n.q-card.highlight .score-num { color: var(--ivory); }\n.score-num span {\n  font-size: 18px;\n  color: var(--slate);\n  font-weight: 500;\n  margin-left: 2px;\n}\n.q-card.highlight .score-num span { color: rgba(255,253,245,0.7); }\n.score-lbl {\n  font-size: 12px;\n  color: var(--slate);\n  margin-top: 4px;\n  font-family: var(--font-mono);\n  text-transform: uppercase;\n  letter-spacing: 0.06em;\n}\n.q-card.highlight .score-lbl { color: rgba(255,253,245,0.7); }\n\n/* ---- Bar stack ---- */\n.bar-stack {\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n  margin: 32px 0;\n}\n.bar {\n  height: 44px;\n  border-radius: 6px;\n  width: var(--w);\n  min-width: 160px;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 0 18px;\n  font-weight: 500;\n  color: var(--ivory);\n  font-size: 15px;\n  position: relative;\n}\n.bar b {\n  font-family: var(--font-disp);\n  font-weight: 900;\n  font-size: 20px;\n}\n.bar.mycket { background: var(--blue); }\n.bar.ganska { background: var(--blue); opacity: 0.55; }\n.bar.good   { background: var(--good); }\n.bar.warn   { background: var(--orange); color: var(--ink); }\n\n/* ---- Q foot ---- */\n.q-foot {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 20px;\n  margin-top: 28px;\n}\n.q-foot.single { grid-template-columns: 1fr; }\n.q-foot.triple { grid-template-columns: repeat(3, 1fr); }\n\n.quote {\n  background: var(--blue-50);\n  border-left: 3px solid var(--blue);\n  padding: 18px 20px;\n  border-radius: 0 6px 6px 0;\n}\n.quote-mark {\n  font-family: var(--font-disp);\n  font-size: 36px;\n  line-height: 0.6;\n  color: var(--blue);\n  margin-bottom: 4px;\n}\n.quote-mark.big {\n  font-size: 72px;\n  line-height: 0.5;\n  margin-bottom: 12px;\n}\n.quote p {\n  font-size: 15px;\n  line-height: 1.5;\n  color: var(--ink);\n  margin: 0 0 10px;\n  text-wrap: pretty;\n}\n.quote cite {\n  font-style: normal;\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--slate);\n  letter-spacing: 0.02em;\n}\n\n.stat-pill {\n  background: var(--ink);\n  color: var(--ivory);\n  padding: 18px 22px;\n  border-radius: 6px;\n  display: flex;\n  align-items: center;\n  gap: 18px;\n}\n.stat-big {\n  font-family: var(--font-disp);\n  font-weight: 900;\n  font-size: 64px;\n  line-height: 1;\n  color: var(--orange);\n  letter-spacing: -0.04em;\n}\n.stat-lbl {\n  font-size: 14px;\n  line-height: 1.35;\n  color: rgba(255,253,245,0.8);\n}\n\n/* ---- People grid (Q2) ---- */\n.people-grid {\n  display: grid;\n  grid-template-columns: repeat(17, 1fr);\n  gap: 6px;\n  margin: 28px 0 16px;\n}\n.people-grid::before {\n  content: \"\";\n  display: block;\n  background:\n    radial-gradient(circle at 50% 50%, var(--blue) 38%, transparent 39%) 0 0/calc(100%/17) 100% repeat-x;\n  height: 38px;\n  width: calc(100% * 14/17);\n  grid-column: 1 / span 14;\n}\n.people-grid::after {\n  content: \"\";\n  display: block;\n  background:\n    radial-gradient(circle at 50% 50%, var(--blue) 38%, transparent 39%) 0 0/calc(100%/17) 100% repeat-x;\n  opacity: 0.4;\n  height: 38px;\n  width: calc(100% * 2/17);\n  grid-column: 15 / span 2;\n}\n.people-legend {\n  display: flex;\n  gap: 22px;\n  flex-wrap: wrap;\n  font-size: 13px;\n  color: var(--slate);\n  margin-bottom: 20px;\n}\n.dot {\n  display: inline-block;\n  width: 10px; height: 10px;\n  border-radius: 50%;\n  margin-right: 6px;\n  vertical-align: middle;\n}\n.dot-many { background: var(--blue); }\n.dot-few  { background: var(--blue); opacity: 0.4; }\n.dot-empty{ background: var(--line); border: 1px solid #cbd5dc; }\n\n/* ---- Callout (avvikelse) ---- */\n.callout {\n  background: var(--card);\n  border: 2px solid var(--orange);\n  border-radius: 8px;\n  padding: 28px 32px;\n  position: relative;\n}\n.callout-tag {\n  display: inline-block;\n  background: var(--orange);\n  color: var(--ink);\n  font-family: var(--font-mono);\n  font-size: 11px;\n  font-weight: 500;\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  padding: 4px 10px;\n  border-radius: 4px;\n  margin-bottom: 16px;\n}\n.callout-quote {\n  font-family: var(--font-disp);\n  font-weight: 700;\n  font-size: 32px;\n  line-height: 1.1;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n  margin: 0 0 8px;\n}\n.callout cite {\n  font-style: normal;\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: var(--slate);\n  display: block;\n  margin-bottom: 16px;\n}\n.callout-note {\n  font-size: 14px;\n  color: var(--ink-2);\n  margin: 0;\n  line-height: 1.55;\n  text-wrap: pretty;\n}\n\n/* ---- Insight ---- */\n.insight {\n  margin-top: 24px;\n  padding: 16px 20px;\n  background: var(--blue-50);\n  border-radius: 6px;\n  display: flex;\n  gap: 14px;\n  align-items: flex-start;\n}\n.insight.warn { background: var(--orange-50); }\n.insight.ok { background: #EAF6EE; }\n.insight-tag {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  font-weight: 500;\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  background: var(--blue);\n  color: var(--ivory);\n  padding: 4px 8px;\n  border-radius: 3px;\n  white-space: nowrap;\n  flex-shrink: 0;\n  margin-top: 2px;\n}\n.insight.warn .insight-tag { background: var(--orange); color: var(--ink); }\n.insight-tag.good { background: var(--good); }\n.insight p {\n  margin: 0;\n  font-size: 14px;\n  line-height: 1.55;\n  color: var(--ink-2);\n  text-wrap: pretty;\n}\n.insight p strong { color: var(--ink); }\n.insight p em { color: var(--blue); font-style: normal; font-weight: 500; }\n\n/* ---- Hero quote ---- */\n.hero-quote {\n  margin: 32px 0 0;\n  padding: 32px 36px;\n  background: var(--blue);\n  color: var(--ivory);\n  border-radius: 8px;\n  position: relative;\n}\n.hero-quote.alt {\n  background: var(--ink);\n}\n.hero-quote .quote-mark {\n  color: var(--orange);\n  position: absolute;\n  top: 12px; left: 24px;\n}\n.hero-quote p {\n  font-family: var(--font-disp);\n  font-weight: 700;\n  font-size: 28px;\n  line-height: 1.2;\n  letter-spacing: -0.02em;\n  margin: 24px 0 12px;\n  text-wrap: pretty;\n}\n.hero-quote cite {\n  font-style: normal;\n  font-family: var(--font-mono);\n  font-size: 12px;\n  color: rgba(255,253,245,0.7);\n}\n\n.mini-quote {\n  background: var(--blue-50);\n  border-radius: 6px;\n  padding: 16px 18px;\n}\n.mini-quote p {\n  font-size: 14px;\n  line-height: 1.45;\n  color: var(--ink);\n  margin: 0 0 8px;\n  text-wrap: pretty;\n}\n.mini-quote cite {\n  font-style: normal;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  color: var(--slate);\n}\n\n/* ---- Press bars ---- */\n.press-bars {\n  display: flex;\n  flex-direction: column;\n  gap: 14px;\n  margin: 28px 0;\n}\n.press-row {\n  display: grid;\n  grid-template-columns: 180px 1fr 40px;\n  gap: 16px;\n  align-items: center;\n}\n.press-row.dim { opacity: 0.5; }\n.press-lbl {\n  font-size: 14px;\n  font-weight: 500;\n  color: var(--ink);\n}\n.press-track {\n  background: var(--blue-50);\n  border-radius: 4px;\n  height: 20px;\n  overflow: hidden;\n}\n.press-fill {\n  height: 100%;\n  width: var(--w);\n  background: var(--blue);\n  border-radius: 4px;\n  transition: width 600ms ease-out;\n}\n.press-fill.warn { background: var(--orange); }\n.press-num {\n  font-family: var(--font-disp);\n  font-weight: 900;\n  font-size: 20px;\n  text-align: right;\n  color: var(--ink);\n}\n\n/* ---- Split bar (Q7) ---- */\n.split-bar {\n  display: flex;\n  gap: 6px;\n  margin: 28px 0;\n}\n.split {\n  width: var(--w);\n  min-width: 200px;\n  padding: 22px 24px;\n  border-radius: 8px;\n}\n.split.good { background: var(--blue); color: var(--ivory); }\n.split.ok { background: var(--blue-100); color: var(--ink); }\n.split-num {\n  font-family: var(--font-disp);\n  font-weight: 900;\n  font-size: 40px;\n  line-height: 1;\n  letter-spacing: -0.03em;\n  margin-bottom: 8px;\n}\n.split-lbl {\n  font-size: 14px;\n  line-height: 1.4;\n  text-wrap: pretty;\n}\n\n/* ---- Streak (Q9) ---- */\n.streak {\n  margin-top: 28px;\n  display: grid;\n  grid-template-columns: auto 1fr;\n  gap: 28px;\n  align-items: center;\n}\n.streak-num {\n  font-family: var(--font-disp);\n  font-weight: 900;\n  font-size: 96px;\n  line-height: 0.85;\n  color: var(--orange);\n  letter-spacing: -0.04em;\n}\n.streak-bar {\n  position: relative;\n  height: 14px;\n  background: rgba(255,253,245,0.18);\n  border-radius: 7px;\n  overflow: hidden;\n}\n.streak-fill {\n  position: absolute;\n  inset: 0;\n  background: linear-gradient(90deg, var(--orange), #FFB74D);\n  border-radius: 7px;\n  width: 100%;\n  transform-origin: left;\n  animation: fill 1.2s ease-out;\n}\n@keyframes fill { from { transform: scaleX(0); } to { transform: scaleX(1); } }\n.streak-note {\n  grid-column: 2;\n  font-size: 16px;\n  color: rgba(255,253,245,0.85);\n  margin-top: 14px;\n}\n.streak-note strong { color: var(--ivory); }\n\n/* ---- Position grid (Q10) ---- */\n.position-grid {\n  display: grid;\n  grid-template-columns: 1.4fr 1fr 1fr;\n  gap: 12px;\n  margin: 28px 0;\n}\n.pos-card {\n  border-radius: 8px;\n  padding: 22px 24px;\n  border: 1px solid var(--line);\n}\n.pos-card.good { background: var(--blue); color: var(--ivory); border-color: var(--blue-700); }\n.pos-card.warn { background: var(--orange-50); border-color: var(--orange-100); }\n.pos-card.neutral { background: var(--card); }\n\n.pos-num {\n  font-family: var(--font-disp);\n  font-weight: 900;\n  font-size: 56px;\n  line-height: 1;\n  letter-spacing: -0.04em;\n  margin-bottom: 10px;\n}\n.pos-card.warn .pos-num { color: var(--orange-700); }\n.pos-card.neutral .pos-num { color: var(--slate); }\n\n.pos-lbl {\n  font-size: 14px;\n  font-weight: 500;\n  margin-bottom: 12px;\n}\n.pos-card.good .pos-lbl { color: rgba(255,253,245,0.85); }\n.pos-card.warn .pos-lbl { color: var(--ink); }\n.pos-card.neutral .pos-lbl { color: var(--ink); }\n\n.pos-quote {\n  font-size: 12px;\n  line-height: 1.4;\n  font-style: italic;\n}\n.pos-card.good .pos-quote { color: rgba(255,253,245,0.75); }\n.pos-card.warn .pos-quote { color: var(--slate); }\n.pos-card.neutral .pos-quote { color: var(--slate); }\n\n/* ---- Goalie (Q11) ---- */\n.goalie-row {\n  display: grid;\n  grid-template-columns: 1.2fr 1fr;\n  gap: 12px;\n  margin: 28px 0;\n}\n.goalie {\n  padding: 24px 28px;\n  border-radius: 8px;\n  display: flex;\n  align-items: center;\n  gap: 18px;\n}\n.goalie.yes {\n  background: var(--blue);\n  color: var(--ivory);\n}\n.goalie.no {\n  background: var(--blue-50);\n  color: var(--ink);\n  text-align: right;\n  justify-content: flex-end;\n}\n.goalie-icon {\n  width: 48px;\n  height: 48px;\n  background: rgba(255,253,245,0.15);\n  border-radius: 50%;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  color: var(--orange);\n  flex-shrink: 0;\n}\n.goalie-icon svg { width: 24px; height: 24px; }\n.goalie-num {\n  font-family: var(--font-disp);\n  font-weight: 900;\n  font-size: 28px;\n  line-height: 1;\n  letter-spacing: -0.025em;\n}\n.goalie.no .goalie-num {\n  font-size: 56px;\n  color: var(--blue);\n  margin-bottom: 4px;\n}\n.goalie-names {\n  font-family: var(--font-mono);\n  font-size: 13px;\n  color: rgba(255,253,245,0.85);\n  margin-top: 4px;\n}\n.goalie-lbl {\n  font-size: 14px;\n  color: var(--slate);\n}\n\n/* ============== WORD CLOUDS ============== */\n\n.word-section {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 24px;\n  margin-bottom: 80px;\n}\n.word-block {\n  background: var(--card);\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  padding: 36px;\n}\n.word-block.alt {\n  background: var(--ink);\n  border-color: var(--ink);\n}\n.word-title {\n  font-family: var(--font-disp);\n  font-weight: 700;\n  font-size: 22px;\n  line-height: 1.15;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n  margin: 0 0 24px;\n}\n.word-block.alt .word-title { color: var(--ivory); }\n.word-title em { color: var(--orange); font-style: normal; }\n\n.word-cloud {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 10px 14px;\n  align-items: baseline;\n}\n.w {\n  font-family: var(--font-disp);\n  font-weight: 700;\n  letter-spacing: -0.015em;\n  color: var(--blue);\n  line-height: 1;\n}\n.word-block.alt .w { color: var(--ivory); }\n.w.lg { font-size: 38px; font-weight: 900; }\n.w.md { font-size: 26px; }\n.w.sm { font-size: 16px; color: var(--slate); font-weight: 500; }\n.word-block.alt .w.sm { color: rgba(255,253,245,0.55); }\n\n/* ============== FINAL QUOTE ============== */\n\n.final-quote {\n  text-align: center;\n  padding: 80px 40px;\n  margin-bottom: 60px;\n  border-top: 1px solid var(--line);\n  border-bottom: 1px solid var(--line);\n}\n.final-tag {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  text-transform: uppercase;\n  letter-spacing: 0.12em;\n  color: var(--orange);\n  margin-bottom: 24px;\n}\n.final-quote blockquote {\n  font-family: var(--font-disp);\n  font-weight: 900;\n  font-size: clamp(40px, 6vw, 72px);\n  line-height: 1.05;\n  letter-spacing: -0.035em;\n  color: var(--ink);\n  margin: 0 0 20px;\n  max-width: 820px;\n  margin-left: auto;\n  margin-right: auto;\n  text-wrap: balance;\n}\n.final-quote blockquote em {\n  font-style: normal;\n  color: var(--blue);\n}\n.final-quote cite {\n  font-style: normal;\n  font-family: var(--font-mono);\n  font-size: 13px;\n  color: var(--slate);\n  letter-spacing: 0.02em;\n}\n\n/* ============== METHOD ============== */\n\n.method {\n  background: var(--card);\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  padding: 32px 36px;\n  margin-top: 16px;\n}\n.method-row {\n  display: grid;\n  grid-template-columns: 1fr auto;\n  gap: 32px;\n  align-items: center;\n  padding-bottom: 24px;\n  border-bottom: 1px solid var(--line);\n}\n.method-tag {\n  font-family: var(--font-mono);\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: 0.12em;\n  color: var(--orange);\n  margin-bottom: 8px;\n}\n.method-row p {\n  margin: 0;\n  font-size: 13px;\n  color: var(--slate);\n  line-height: 1.6;\n  max-width: 640px;\n  text-wrap: pretty;\n}\n.method-stamp {\n  text-align: center;\n  border: 2px dashed var(--line);\n  border-radius: 50%;\n  width: 110px;\n  height: 110px;\n  display: flex;\n  flex-direction: column;\n  justify-content: center;\n}\n.stamp-num {\n  font-family: var(--font-disp);\n  font-weight: 900;\n  font-size: 40px;\n  line-height: 1;\n  color: var(--blue);\n  letter-spacing: -0.04em;\n}\n.stamp-lbl {\n  font-size: 10px;\n  font-family: var(--font-mono);\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  color: var(--slate);\n  margin-top: 4px;\n  padding: 0 8px;\n  line-height: 1.3;\n}\n.method-foot {\n  margin-top: 20px;\n  display: flex;\n  justify-content: space-between;\n  font-family: var(--font-mono);\n  font-size: 11px;\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  color: var(--slate);\n  flex-wrap: wrap;\n  gap: 10px;\n}\n\n/* ============== RESPONSIVE ============== */\n\n@media (max-width: 880px) {\n  .page { padding: 32px 20px 64px; }\n  .mood-overview { grid-template-columns: repeat(2, 1fr); }\n  .tldr-grid { grid-template-columns: 1fr; gap: 28px; }\n  .q-card { padding: 28px 22px; }\n  .q-head { grid-template-columns: 1fr; }\n  .q-score { text-align: left; }\n  .q-foot, .q-foot.triple { grid-template-columns: 1fr; }\n  .word-section { grid-template-columns: 1fr; }\n  .position-grid, .goalie-row { grid-template-columns: 1fr; }\n  .press-row { grid-template-columns: 120px 1fr 36px; gap: 10px; }\n  .press-lbl { font-size: 12px; }\n  .split-bar { flex-direction: column; }\n  .split { width: 100% !important; }\n  .streak { grid-template-columns: 1fr; }\n  .streak-note { grid-column: 1; }\n  .method-row { grid-template-columns: 1fr; }\n}\n</style>\n\n</head>\n<body>\n<div id=\"share-toolbar\" data-agent-md=\"index.md\" data-md-size=\"~7.5KB\">\n  <div class=\"st-left\"><span class=\"st-label\">Shared artifact</span></div>\n  <div class=\"st-tip\">\n    <span class=\"st-icon\" aria-hidden=\"true\">\u26a1</span>\n    <span>Open with <strong>Claude for Chrome</strong> or your agent extension to discuss this page together.</span>\n  </div>\n  <div class=\"st-actions\">\n    <button id=\"share-toolbar-copy\" type=\"button\" aria-label=\"Copy agent instructions and links\">Copy information for agent</button>\n  </div>\n</div>\n<style>\n  /* Keep the toolbar planted at the top of the viewport \u2014 sticky interacted\n     badly with the artifact's body top-padding (40px of cream above it on\n     load, then covered when scroll pinned it). Fixed + measured body padding\n     avoids the visual jump. */\n  #share-toolbar{\n    position:fixed; top:0; left:0; right:0; z-index:9999;\n    display:flex; align-items:center; gap:20px;\n    padding:10px 20px;\n    background:#001129; color:#FFFDF5;\n    font-family:\"GT America Mono\", ui-monospace, Menlo, Consolas, monospace;\n    font-size:13px; line-height:1.4; letter-spacing:.02em;\n    border-bottom:1px solid #0a2340;\n    box-shadow:0 2px 0 rgba(0,0,0,.08);\n  }\n  /* Override the artifact's body padding-top so the toolbar doesn't occlude\n     the page card. JS refines this to the actual toolbar height on load\n     and on resize (mobile wraps to multiple rows). */\n  body{ padding-top:72px; }\n  #share-toolbar .st-label{\n    font-weight:600; letter-spacing:.08em; text-transform:uppercase;\n    font-size:11px; color:#9fb5d6;\n  }\n  #share-toolbar .st-tip{flex:1; color:#cfe0f7; display:flex; align-items:center; gap:8px;}\n  #share-toolbar .st-tip strong{color:#FFFDF5; font-weight:600;}\n  #share-toolbar .st-icon{font-size:14px; color:#F5C800;}\n  #share-toolbar button{\n    background:#F5C800; color:#001129; border:none; cursor:pointer;\n    padding:8px 14px; border-radius:6px;\n    font:600 11px/1 \"GT America Mono\", ui-monospace, Menlo, monospace;\n    letter-spacing:.06em; text-transform:uppercase;\n    transition:background .15s, color .15s;\n  }\n  #share-toolbar button:hover{background:#ffd633;}\n  #share-toolbar button.copied{background:#16a34a; color:#fff;}\n  @media (max-width:900px){\n    #share-toolbar{flex-direction:column; align-items:flex-start; gap:8px; padding:10px 16px;}\n    #share-toolbar .st-actions{align-self:stretch;}\n    #share-toolbar button{width:100%;}\n  }\n  @media print{\n    #share-toolbar{display:none !important;}\n    body{padding-top:0 !important;}\n  }\n</style>\n<script>\n(function(){\n  var bar = document.getElementById('share-toolbar');\n  var btn = document.getElementById('share-toolbar-copy');\n  if (!bar || !btn) return;\n\n  // Measure-and-apply the content offset so the card below clears the toolbar\n  // plus a 24px breathing gap. Redo on resize because the bar wraps to a\n  // taller column layout under 900px.\n  var GAP = 24;\n  function syncPad(){\n    document.body.style.paddingTop = (bar.offsetHeight + GAP) + 'px';\n  }\n  syncPad();\n  window.addEventListener('resize', syncPad);\n\n  var mdUrl = new URL(bar.dataset.agentMd || 'index.md', window.location.href).href;\n  var pageUrl = window.location.href;\n  // Conditional size rendering: include the size token only when data-md-size is set,\n  // so the parenthetical reads \"(~7.4KB, fetch in full)\" or \"(fetch in full)\" gracefully.\n  var mdSize = bar.dataset.mdSize || '';\n  var mdParen = mdSize ? '(' + mdSize + ', fetch in full)' : '(fetch in full)';\n  var payload =\n    \"I'm sharing a Claude Design artifact with you.\\n\\n\" +\n    \"- Markdown (canonical, for you): \" + mdUrl + \"  \" + mdParen + \"\\n\" +\n    \"- HTML (what I'm viewing): \" + pageUrl + \"  (JS loader \\u2014 don't fetch)\\n\\n\" +\n    \"Please:\\n\" +\n    \"1. Fetch the markdown. If the fetch fails, tell me \\u2014 don't guess from the URL.\\n\" +\n    \"2. Reply with one line confirming what it's about, then ask what I'd like to do (unless I already told you).\\n\" +\n    \"3. I have the HTML open \\u2014 don't restate the doc. Reference sections by name.\\n\" +\n    \"4. Default to discussing my work, not rewriting it, unless I ask for edits.\";\n  btn.addEventListener('click', async function(){\n    try { await navigator.clipboard.writeText(payload); }\n    catch(e){\n      var ta = document.createElement('textarea');\n      ta.value = payload; ta.style.position='fixed'; ta.style.opacity='0';\n      document.body.appendChild(ta); ta.select();\n      try{ document.execCommand('copy'); } finally { ta.remove(); }\n    }\n    var orig = btn.textContent;\n    btn.textContent = 'Copied \u2713';\n    btn.classList.add('copied');\n    setTimeout(function(){ btn.textContent = orig; btn.classList.remove('copied'); }, 1800);\n  });\n})();\n<\/script>\n\n\n<main class=\"page\">\n\n  <!-- ============== HEADER ============== -->\n  <header class=\"hero\">\n    <div class=\"hero-meta\">\n      <span class=\"badge\">Lagenk\u00e4t \u00b7 S\u00e4songen 2025/26</span>\n      <span class=\"meta-dot\"></span>\n      <span class=\"meta-text\">17 svar av 18 spelare \u00b7 Maj 2026</span>\n    </div>\n    <h1 class=\"hero-title\">\n      Vad <em>tycker</em> tjejerna<br>egentligen?\n    </h1>\n    <p class=\"hero-sub\">\n      En sammanfattning av enk\u00e4tsvaren fr\u00e5n K\u00e4vlinge HK F14. Genomsnittlig st\u00e4mning per fr\u00e5ga,\n      avvikelser v\u00e4rda att uppm\u00e4rksamma, och r\u00f6sterna bakom siffrorna.\n    </p>\n\n    <!-- Mood bar overview -->\n    <div class=\"mood-overview\">\n      <div class=\"mood-cell good\">\n        <div class=\"mood-num\">94<span>%</span></div>\n        <div class=\"mood-lbl\">trivs mycket eller ganska bra</div>\n      </div>\n      <div class=\"mood-cell good\">\n        <div class=\"mood-num\">100<span>%</span></div>\n        <div class=\"mood-lbl\">vill spela n\u00e4sta s\u00e4song</div>\n      </div>\n      <div class=\"mood-cell good\">\n        <div class=\"mood-num\">88<span>%</span></div>\n        <div class=\"mood-lbl\">n\u00f6jda med sin position</div>\n      </div>\n      <div class=\"mood-cell warn\">\n        <div class=\"mood-num\">3</div>\n        <div class=\"mood-lbl\">vill vara med i m\u00e5lvaktsteamet</div>\n      </div>\n    </div>\n  </header>\n\n  <!-- ============== TLDR ============== -->\n  <section class=\"tldr\">\n    <div class=\"tldr-tag\">TL;DR</div>\n    <div class=\"tldr-grid\">\n      <div class=\"tldr-col\">\n        <h3>St\u00e4mningen i laget \u00e4r riktigt god</h3>\n        <p>\n          N\u00e4stan alla tjejer trivs mycket bra, har m\u00e5nga kompisar och tycker att tr\u00e4narna \u00e4r r\u00e4ttvisa\n          och sn\u00e4lla. <strong>Alla 17 vill spela vidare</strong> n\u00e4sta s\u00e4song \u2014 det \u00e4r s\u00e5 bra det kan bli.\n        </p>\n      </div>\n      <div class=\"tldr-col\">\n        <h3>Pressen kommer inifr\u00e5n</h3>\n        <p>\n          Ingen pekar p\u00e5 tr\u00e4nare eller f\u00f6r\u00e4ldrar. Den press som finns l\u00e4gger tjejerna p\u00e5 sig sj\u00e4lva \u2014\n          de <strong>vill prestera och vara bra</strong>. Det \u00e4r bra drivkraft, men v\u00e4rt att h\u00e5lla \u00f6gonen p\u00e5.\n        </p>\n      </div>\n      <div class=\"tldr-col\">\n        <h3>Tre saker att titta n\u00e4rmare p\u00e5</h3>\n        <ul>\n          <li><strong>L.</strong> har ibland k\u00e4nt sig utanf\u00f6r \u2014 \u201ddet k\u00e4nns ensamt\u201d.</li>\n          <li>Tjejerna efterfr\u00e5gar <strong>mer tempo, mindre v\u00e4ntan</strong> p\u00e5 tr\u00e4ningarna.</li>\n          <li>Bara <strong>tre</strong> vill g\u00e5 med i m\u00e5lvaktsteamet \u2014 kan beh\u00f6va fler.</li>\n        </ul>\n      </div>\n    </div>\n  </section>\n\n  <!-- ============== SECTION DIVIDER ============== -->\n  <div class=\"divider\">\n    <span class=\"divider-num\">01</span>\n    <span class=\"divider-label\">Trivsel &amp; gemenskap</span>\n    <span class=\"divider-line\"></span>\n  </div>\n\n  <!-- Q1: Trivs i laget -->\n  <section class=\"q-card\">\n    <div class=\"q-head\">\n      <div class=\"q-num\">Q1</div>\n      <div>\n        <h2 class=\"q-title\">Hur trivs du i laget?</h2>\n        <p class=\"q-sub\">Skala: Mycket bra \u00b7 Ganska bra \u00b7 Inte s\u00e5 bra \u00b7 Inte alls</p>\n      </div>\n      <div class=\"q-score\">\n        <div class=\"score-num\">4,9<span>/5</span></div>\n        <div class=\"score-lbl\">Snittst\u00e4mning</div>\n      </div>\n    </div>\n\n    <div class=\"bar-stack\">\n      <div class=\"bar mycket\" style=\"--w:88%\"><span>Mycket bra</span><b>14</b></div>\n      <div class=\"bar ganska\" style=\"--w:12%\"><span>Ganska bra</span><b>2</b></div>\n    </div>\n\n    <div class=\"q-foot\">\n      <div class=\"quote\">\n        <div class=\"quote-mark\">\u201d</div>\n        <p>Kompisar, utmaning, tr\u00e4nare och sj\u00e4lvaste sporten.</p>\n        <cite>\u2014 E., om varf\u00f6r hon trivs</cite>\n      </div>\n      <div class=\"stat-pill\">\n        <div class=\"stat-big\">0</div>\n        <div class=\"stat-lbl\">spelare svarar \u201dinte s\u00e5 bra\u201d eller s\u00e4mre</div>\n      </div>\n    </div>\n  </section>\n\n  <!-- Q2: Kompisar -->\n  <section class=\"q-card\">\n    <div class=\"q-head\">\n      <div class=\"q-num\">Q2</div>\n      <div>\n        <h2 class=\"q-title\">Har du kompisar i laget?</h2>\n        <p class=\"q-sub\">Alla 16 svarande har minst n\u00e5gra kompisar \u2014 de flesta har m\u00e5nga.</p>\n      </div>\n      <div class=\"q-score\">\n        <div class=\"score-num\">100<span>%</span></div>\n        <div class=\"score-lbl\">har kompisar</div>\n      </div>\n    </div>\n\n    <!-- People dot grid -->\n    <div class=\"people-grid\" aria-hidden=\"true\">\n      <!-- 14 \"many\" + 2 \"few\" + 1 unanswered = 17 -->\n    </div>\n    <div class=\"people-legend\">\n      <span><i class=\"dot dot-many\"></i>Ja, m\u00e5nga \u00b7 14</span>\n      <span><i class=\"dot dot-few\"></i>Ja, n\u00e5gra \u00b7 2</span>\n      <span><i class=\"dot dot-empty\"></i>Inget svar \u00b7 1</span>\n    </div>\n\n    <div class=\"q-foot\">\n      <div class=\"quote\">\n        <div class=\"quote-mark\">\u201d</div>\n        <p>Jag har m\u00e5nga kompisar i laget och har hittat min b\u00e4sta kompis.</p>\n        <cite>\u2014 E.</cite>\n      </div>\n      <div class=\"quote\">\n        <div class=\"quote-mark\">\u201d</div>\n        <p>Jag har precis b\u00f6rjat s\u00e5 har inte j\u00e4ttem\u00e5nga \u00e4n.</p>\n        <cite>\u2014 E., ny i laget</cite>\n      </div>\n    </div>\n  </section>\n\n  <!-- Q3: Utanf\u00f6r -->\n  <section class=\"q-card flag\">\n    <div class=\"q-head\">\n      <div class=\"q-num flag-num\">Q3</div>\n      <div>\n        <h2 class=\"q-title\">Har du n\u00e5gon g\u00e5ng k\u00e4nt dig utanf\u00f6r?</h2>\n        <p class=\"q-sub\">Den enda riktiga avvikelsen i hela enk\u00e4ten \u2014 v\u00e4rd att f\u00e5nga upp.</p>\n      </div>\n      <div class=\"q-score warn\">\n        <div class=\"score-num\">1<span>/16</span></div>\n        <div class=\"score-lbl\">har k\u00e4nt sig utanf\u00f6r</div>\n      </div>\n    </div>\n\n    <div class=\"bar-stack\">\n      <div class=\"bar good\" style=\"--w:94%\"><span>Nej</span><b>15</b></div>\n      <div class=\"bar warn\" style=\"--w:6%\"><span>N\u00e5gon g\u00e5ng</span><b>1</b></div>\n    </div>\n\n    <div class=\"q-foot single\">\n      <div class=\"callout\">\n        <div class=\"callout-tag\">\u2691 Avvikelse</div>\n        <p class=\"callout-quote\">\u201dDet k\u00e4nns ensamt.\u201d</p>\n        <cite>\u2014 L., som ibland k\u00e4nt sig utanf\u00f6r</cite>\n        <p class=\"callout-note\">\n          En av femton \u00e4r fortfarande en av femton. V\u00e4rt ett enskilt samtal \u2014 och att lyfta in i tr\u00e4narens\n          \u201dbjuda in alla\u201d-tanke som flera andra spelare n\u00e4mner som styrka.\n        </p>\n      </div>\n    </div>\n  </section>\n\n  <!-- ============== SECTION DIVIDER ============== -->\n  <div class=\"divider\">\n    <span class=\"divider-num\">02</span>\n    <span class=\"divider-label\">Tr\u00e4ning &amp; match</span>\n    <span class=\"divider-line\"></span>\n  </div>\n\n  <!-- Q4: Tr\u00e4ningar roliga -->\n  <section class=\"q-card\">\n    <div class=\"q-head\">\n      <div class=\"q-num\">Q4</div>\n      <div>\n        <h2 class=\"q-title\">Tycker du att tr\u00e4ningarna \u00e4r roliga?</h2>\n        <p class=\"q-sub\">Skala: Alltid \u00b7 Ofta \u00b7 S\u00e4llan \u00b7 Aldrig</p>\n      </div>\n      <div class=\"q-score\">\n        <div class=\"score-num\">4,6<span>/5</span></div>\n        <div class=\"score-lbl\">Snittst\u00e4mning</div>\n      </div>\n    </div>\n\n    <div class=\"bar-stack\">\n      <div class=\"bar mycket\" style=\"--w:64%\"><span>Alltid</span><b>9</b></div>\n      <div class=\"bar ganska\" style=\"--w:36%\"><span>Ofta</span><b>5</b></div>\n    </div>\n\n    <div class=\"q-foot\">\n      <div class=\"quote\">\n        <div class=\"quote-mark\">\u201d</div>\n        <p>Roligt: fys, spela, f\u00f6rsvar, anfall, individuell teknik. Mindre roligt: passa mot en v\u00e4gg.</p>\n        <cite>\u2014 L.</cite>\n      </div>\n      <div class=\"quote\">\n        <div class=\"quote-mark\">\u201d</div>\n        <p>Roligt n\u00e4r vi har tempo\u00ad\u00f6vningar. Mindre roligt n\u00e4r det \u00e4r mycket v\u00e4ntan.</p>\n        <cite>\u2014 E.</cite>\n      </div>\n    </div>\n\n    <div class=\"insight\">\n      <span class=\"insight-tag\">M\u00f6nster</span>\n      <p>\n        Fyra av sex kommentarer pekar \u00e5t samma h\u00e5ll: <strong>mer tempo, mer spel, mindre v\u00e4ntan</strong>.\n        M. vill kortare pass av samma \u00f6vning, K. vill mer beach och kontringar.\n      </p>\n    </div>\n  </section>\n\n  <!-- Q5: Match -->\n  <section class=\"q-card\">\n    <div class=\"q-head\">\n      <div class=\"q-num\">Q5</div>\n      <div>\n        <h2 class=\"q-title\">Tycker du det \u00e4r roligt att spela match?</h2>\n        <p class=\"q-sub\">Inga tveksamheter h\u00e4r.</p>\n      </div>\n      <div class=\"q-score\">\n        <div class=\"score-num\">15<span>/15</span></div>\n        <div class=\"score-lbl\">Ja</div>\n      </div>\n    </div>\n\n    <div class=\"hero-quote\">\n      <div class=\"quote-mark big\">\u201d</div>\n      <p>\n        Jag \u00e4lskar att spela match f\u00f6r att vi f\u00e5r gemenskap genom att m\u00f6ta andra tuffa lag.\n      </p>\n      <cite>\u2014 E.</cite>\n    </div>\n\n    <div class=\"q-foot triple\">\n      <div class=\"mini-quote\">\n        <p>\u201dDet \u00e4r kul att man tr\u00e4ffar alla lagkompisar och att t\u00e4vla.\u201d</p>\n        <cite>\u2014 K.</cite>\n      </div>\n      <div class=\"mini-quote\">\n        <p>\u201dDet \u00e4r kul att g\u00f6ra m\u00e5l men ocks\u00e5 g\u00f6ra s\u00e5 att andra g\u00f6r m\u00e5l.\u201d</p>\n        <cite>\u2014 L.</cite>\n      </div>\n      <div class=\"mini-quote\">\n        <p>\u201dAtt vi f\u00e5r m\u00f6ta andra lag och se hur bra de \u00e4r.\u201d</p>\n        <cite>\u2014 V.</cite>\n      </div>\n    </div>\n  </section>\n\n  <!-- ============== SECTION DIVIDER ============== -->\n  <div class=\"divider\">\n    <span class=\"divider-num\">03</span>\n    <span class=\"divider-label\">Press &amp; misslyckande</span>\n    <span class=\"divider-line\"></span>\n  </div>\n\n  <!-- Q6: Press from -->\n  <section class=\"q-card\">\n    <div class=\"q-head\">\n      <div class=\"q-num\">Q6</div>\n      <div>\n        <h2 class=\"q-title\">Var kommer pressen ifr\u00e5n?</h2>\n        <p class=\"q-sub\">Spelarna kunde markera flera k\u00e4llor. Resultatet \u00e4r v\u00e4ldigt tydligt.</p>\n      </div>\n      <div class=\"q-score\">\n        <div class=\"score-num\">10<span>/12</span></div>\n        <div class=\"score-lbl\">pekar p\u00e5 sig sj\u00e4lva</div>\n      </div>\n    </div>\n\n    <div class=\"press-bars\">\n      <div class=\"press-row\">\n        <span class=\"press-lbl\">Fr\u00e5n dig sj\u00e4lv</span>\n        <div class=\"press-track\"><div class=\"press-fill\" style=\"--w:83%\"></div></div>\n        <span class=\"press-num\">10</span>\n      </div>\n      <div class=\"press-row\">\n        <span class=\"press-lbl\">Fr\u00e5n lagkamrater</span>\n        <div class=\"press-track\"><div class=\"press-fill warn\" style=\"--w:8%\"></div></div>\n        <span class=\"press-num\">1</span>\n      </div>\n      <div class=\"press-row dim\">\n        <span class=\"press-lbl\">Fr\u00e5n tr\u00e4nare</span>\n        <div class=\"press-track\"><div class=\"press-fill\" style=\"--w:0%\"></div></div>\n        <span class=\"press-num\">0</span>\n      </div>\n      <div class=\"press-row dim\">\n        <span class=\"press-lbl\">Fr\u00e5n f\u00f6r\u00e4ldrar</span>\n        <div class=\"press-track\"><div class=\"press-fill\" style=\"--w:0%\"></div></div>\n        <span class=\"press-num\">0</span>\n      </div>\n    </div>\n\n    <div class=\"q-foot\">\n      <div class=\"quote\">\n        <div class=\"quote-mark\">\u201d</div>\n        <p>Jag k\u00e4nner att jag vill leverera.</p>\n        <cite>\u2014 L.</cite>\n      </div>\n      <div class=\"quote\">\n        <div class=\"quote-mark\">\u201d</div>\n        <p>Jag k\u00e4nner inte s\u00e5 mycket men n\u00e4r jag st\u00e5r i m\u00e5l och sl\u00e4pper in mycket s\u00e5 blir jag ledsen och tycker inte jag \u00e4r bra.</p>\n        <cite>\u2014 K.</cite>\n      </div>\n    </div>\n  </section>\n\n  <!-- Q7: Failure -->\n  <section class=\"q-card\">\n    <div class=\"q-head\">\n      <div class=\"q-num\">Q7</div>\n      <div>\n        <h2 class=\"q-title\">Hur k\u00e4nns det n\u00e4r du misslyckas p\u00e5 match?</h2>\n        <p class=\"q-sub\">T.ex. en missad passning eller ett bommat skott.</p>\n      </div>\n      <div class=\"q-score\">\n        <div class=\"score-num\">100<span>%</span></div>\n        <div class=\"score-lbl\">hanterar det sunt</div>\n      </div>\n    </div>\n\n    <div class=\"split-bar\">\n      <div class=\"split good\" style=\"--w:56%\">\n        <div class=\"split-num\">9</div>\n        <div class=\"split-lbl\">\u201dDet spelar ingen roll, jag klarar det n\u00e4sta g\u00e5ng.\u201d</div>\n      </div>\n      <div class=\"split ok\" style=\"--w:44%\">\n        <div class=\"split-num\">7</div>\n        <div class=\"split-lbl\">\u201dLite jobbigt men sl\u00e4pper det fort.\u201d</div>\n      </div>\n    </div>\n\n    <div class=\"insight ok\">\n      <span class=\"insight-tag good\">Styrka</span>\n      <p>\n        <strong>Ingen</strong> markerade \u201dtar det h\u00e5rt\u201d eller \u201dt\u00e4nker p\u00e5 det l\u00e4nge\u201d. Lagets mentala\n        verktygsl\u00e5da fungerar \u2014 flera ber\u00e4ttar att de t\u00e4nker \u201ds\u00e5 ska jag g\u00f6ra n\u00e4sta g\u00e5ng\u201d direkt efter ett\n        misstag.\n      </p>\n    </div>\n\n    <div class=\"q-foot\">\n      <div class=\"quote\">\n        <div class=\"quote-mark\">\u201d</div>\n        <p>F\u00f6r att man g\u00f6r sit b\u00e4sta och man kan inte g\u00f6ra mer.</p>\n        <cite>\u2014 T.</cite>\n      </div>\n      <div class=\"quote\">\n        <div class=\"quote-mark\">\u201d</div>\n        <p>Att jag skulle gjort s\u00e5 n\u00e4r jag sk\u00f6t \u2014 och d\u00e5 brukar det bli m\u00e5l n\u00e4sta g\u00e5ng.</p>\n        <cite>\u2014 V.</cite>\n      </div>\n    </div>\n  </section>\n\n  <!-- ============== SECTION DIVIDER ============== -->\n  <div class=\"divider\">\n    <span class=\"divider-num\">04</span>\n    <span class=\"divider-label\">Tr\u00e4nare &amp; r\u00e4ttvisa</span>\n    <span class=\"divider-line\"></span>\n  </div>\n\n  <!-- Q8: R\u00e4ttvisa -->\n  <section class=\"q-card\">\n    <div class=\"q-head\">\n      <div class=\"q-num\">Q8</div>\n      <div>\n        <h2 class=\"q-title\">Behandlar tr\u00e4narna alla r\u00e4ttvist?</h2>\n        <p class=\"q-sub\">Skala: Ja \u00b7 Ibland \u00b7 Nej</p>\n      </div>\n      <div class=\"q-score\">\n        <div class=\"score-num\">4,8<span>/5</span></div>\n        <div class=\"score-lbl\">Snittst\u00e4mning</div>\n      </div>\n    </div>\n\n    <div class=\"bar-stack\">\n      <div class=\"bar mycket\" style=\"--w:88%\"><span>Ja</span><b>14</b></div>\n      <div class=\"bar ganska\" style=\"--w:12%\"><span>Ibland</span><b>2</b></div>\n    </div>\n\n    <div class=\"hero-quote alt\">\n      <div class=\"quote-mark big\">\u201d</div>\n      <p>Att jag tycker ni \u00e4r de b\u00e4sta tr\u00e4nare jag haft.</p>\n      <cite>\u2014 V.</cite>\n    </div>\n\n    <div class=\"q-foot\">\n      <div class=\"quote\">\n        <div class=\"quote-mark\">\u201d</div>\n        <p>De bryr sig om alla, s\u00e4ger vad man ska t\u00e4nka p\u00e5 och vad man g\u00f6r bra.</p>\n        <cite>\u2014 E.</cite>\n      </div>\n      <div class=\"quote\">\n        <div class=\"quote-mark\">\u201d</div>\n        <p>Att de ser till att alla blir lika tr\u00e4nade.</p>\n        <cite>\u2014 V.</cite>\n      </div>\n    </div>\n  </section>\n\n  <!-- ============== SECTION DIVIDER ============== -->\n  <div class=\"divider\">\n    <span class=\"divider-num\">05</span>\n    <span class=\"divider-label\">Framtid &amp; roller</span>\n    <span class=\"divider-line\"></span>\n  </div>\n\n  <!-- Q9: Continue -->\n  <section class=\"q-card highlight\">\n    <div class=\"q-head\">\n      <div class=\"q-num\">Q9</div>\n      <div>\n        <h2 class=\"q-title\">Spelar du med F14 \u00e4ven n\u00e4sta s\u00e4song?</h2>\n        <p class=\"q-sub\">Den viktigaste siffran i hela enk\u00e4ten.</p>\n      </div>\n      <div class=\"q-score big\">\n        <div class=\"score-num\">17<span>/17</span></div>\n        <div class=\"score-lbl\">Ja, jag forts\u00e4tter absolut</div>\n      </div>\n    </div>\n\n    <div class=\"streak\">\n      <div class=\"streak-num\">100%</div>\n      <div class=\"streak-bar\">\n        <div class=\"streak-fill\"></div>\n      </div>\n      <div class=\"streak-note\">\n        Inte ett enda \u201dkanske\u201d. Inte ett enda \u201dnej\u201d. <strong>Hela laget vill spela vidare.</strong>\n      </div>\n    </div>\n  </section>\n\n  <!-- Q10: Position -->\n  <section class=\"q-card\">\n    <div class=\"q-head\">\n      <div class=\"q-num\">Q10</div>\n      <div>\n        <h2 class=\"q-title\">\u00c4r du n\u00f6jd med din position?</h2>\n        <p class=\"q-sub\">Skala: Ja (1) \u00b7 Nej (0). Tv\u00e5 l\u00e4mnade fr\u00e5gan blank.</p>\n      </div>\n      <div class=\"q-score\">\n        <div class=\"score-num\">88<span>%</span></div>\n        <div class=\"score-lbl\">av de som svarat</div>\n      </div>\n    </div>\n\n    <div class=\"position-grid\">\n      <div class=\"pos-card good\">\n        <div class=\"pos-num\">13</div>\n        <div class=\"pos-lbl\">N\u00f6jda med sin position</div>\n        <div class=\"pos-quote\">\u201dFaktiskt s\u00e5 \u00e4r jag j\u00e4tten\u00f6jd d\u00e4r jag spelar.\u201d \u2014 E.</div>\n      </div>\n      <div class=\"pos-card warn\">\n        <div class=\"pos-num\">2</div>\n        <div class=\"pos-lbl\">Vill spela n\u00e5got annat</div>\n        <div class=\"pos-quote\">\u201dJag vill helst spela p\u00e5 v\u00e4nster eller h\u00f6ger nia.\u201d \u2014 W.</div>\n      </div>\n      <div class=\"pos-card neutral\">\n        <div class=\"pos-num\">2</div>\n        <div class=\"pos-lbl\">Inget svar</div>\n        <div class=\"pos-quote\">V\u00e4rt en koll: vad t\u00e4nker de?</div>\n      </div>\n    </div>\n\n    <div class=\"insight\">\n      <span class=\"insight-tag\">Att fundera p\u00e5</span>\n      <p>\n        Flera n\u00e4mner specifika \u00f6nske \"divider\">\n    <span class=\"divider-num\">06</span>\n    <span class=\"divider-label\">Lagets egna ord</span>\n    <span class=\"divider-line\"></span>\n  </div>\n\n  <section class=\"word-section\">\n    <div class=\"word-block\">\n      <h3 class=\"word-title\">Vad spelarna tycker att de \u00e4r <em>bra p\u00e5</em></h3>\n      <div class=\"word-cloud\">\n        <span class=\"w lg\">peppa laget</span>\n        <span class=\"w md\">f\u00f6rsvar</span>\n        <span class=\"w lg\">vara sn\u00e4ll</span>\n        <span class=\"w sm\">skjuta h\u00e5rt</span>\n        <span class=\"w md\">passningar</span>\n        <span class=\"w sm\">sp\u00e4rra</span>\n        <span class=\"w md\">l\u00e5sa</span>\n        <span class=\"w sm\">stegis\u00e4ttning</span>\n        <span class=\"w lg\">bjuda in alla</span>\n        <span class=\"w sm\">linjespel</span>\n        <span class=\"w md\">springa</span>\n        <span class=\"w sm\">ta hand om de som \u00e4r ledsna</span>\n      </div>\n    </div>\n\n    <div class=\"word-block alt\">\n      <h3 class=\"word-title\">Vad spelarna vill bli <em>b\u00e4ttre p\u00e5</em></h3>\n      <div class=\"word-cloud\">\n        <span class=\"w lg\">f\u00f6rsvar</span>\n        <span class=\"w md\">finter</span>\n        <span class=\"w sm\">kullager</span>\n        <span class=\"w md\">passningar</span>\n        <span class=\"w sm\">stega f\u00f6rbi</span>\n        <span class=\"w lg\">teknik</span>\n        <span class=\"w sm\">skott fr\u00e5n kant</span>\n        <span class=\"w md\">kondition</span>\n        <span class=\"w sm\">genombrott</span>\n        <span class=\"w md\">anfall</span>\n        <span class=\"w sm\">anv\u00e4nda benen i m\u00e5let</span>\n        <span class=\"w sm\">m\u00e5lvakt</span>\n      </div>\n    </div>\n  </section>\n\n  <!-- ============== FINAL WORDS ============== -->\n  <section class=\"final-quote\">\n    <div class=\"final-tag\">Sista ordet till spelarna</div>\n    <blockquote>\n      Ni g\u00f6r
